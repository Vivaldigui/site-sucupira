name: Daily blog build

on:
  schedule:
    - cron: '20 8 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build Astro blog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Optional Firebase deploy can be added later with a repository secret.
      # Suggested secret name: FIREBASE_SERVICE_ACCOUNT_BLOG_SUCUPIRA.
      # Keep deploy disabled until the secret and project policy are reviewed.
