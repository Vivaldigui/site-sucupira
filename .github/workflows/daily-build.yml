name: Daily blog deploy

on:
  schedule:
    - cron: '20 8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy Astro blog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLOG_SUCUPIRA }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project blog-sucupira --non-interactive
